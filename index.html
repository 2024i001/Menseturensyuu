<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRコード面接練習回数管理システム</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 20px; background-color: #f8f9fa; color: #333; }
    h2 { color: #004085; }
    #canvas { width: 100%; max-width: 400px; border: 3px solid #007bff; border-radius: 8px; background: #eee; }
    #result { font-size: 1.3em; font-weight: bold; color: #0056b3; margin-top: 15px; padding: 10px; border-radius: 5px; min-height: 40px; }
    .select-box { margin-bottom: 15px; font-size: 1.1em; padding: 5px; }
    select { font-size: 1em; padding: 5px 10px; border-radius: 4px; border: 1px solid #ccc; }
    .success-alert { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error-alert { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>

  <h2>面接練習回数管理用 QRスキャナー</h2>
  
  <div class="select-box">
    <label for="teacher"><strong>担当先生: </strong></label>
    <select id="teacher">
      <option value="未選択">-- 先生を選択してください --</option>
      <option value="佐藤先生">佐藤先生</option>
      <option value="鈴木先生">鈴木先生</option>
      <option value="高橋先生">高橋先生</option>
    </select>
  </div>
  
  <canvas id="canvas" hidden></canvas>
  <div id="loading">カメラを起動中...</div>
  <div id="result">QRコードをかざしてください</div>

  <script>
    // ==========================================
    // 【必須】ここに新しくデプロイしたGASの /exec URLを貼り付けてください
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/XXXXX/exec";
    // ==========================================

    window.addEventListener('DOMContentLoaded', () => {
      startCamera();
    });

    function startCamera() {
      const video = document.createElement("video");
      const canvasElement = document.getElementById("canvas");
      const canvas = canvasElement.getContext("2d", { willReadFrequently: true });
      const loadingMessage = document.getElementById("loading");
      const outputData = document.getElementById("result");
      let isProcessing = false; 

      // カメラの起動（facingMode: "environment" で背面カメラを優先）
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.play();
        requestAnimationFrame(tick);
      }).catch(function(err) {
        outputData.innerText = "カメラが起動できません: " + err.message;
        outputData.className = "error-alert";
      });

      function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          if (loadingMessage) loadingMessage.hidden = true;
          canvasElement.hidden = false;

          canvasElement.height = video.videoHeight;
          canvasElement.width = video.videoWidth;
          canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
          
          var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
          var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
          
          if (code && !isProcessing) {
            const teacherName = document.getElementById("teacher").value;
            
            if (teacherName === "未選択") {
              outputData.innerText = "エラー: 先に先生を選択してください！";
              outputData.className = "error-alert";
              setTimeout(() => { requestAnimationFrame(tick); }, 2000);
              return;
            }

            isProcessing = true; 
            outputData.innerText = "データ送信中... (ID: " + code.data + ")";
            outputData.style.color = "orange";
            outputData.className = "";

            // GitHubからGASのAPI（doPost）へデータを安全に送信
            fetch(GAS_WEB_APP_URL, {
              method: "POST",
              body: JSON.stringify({ teacherName: teacherName, studentId: code.data }),
              headers: { "Content-Type": "text/plain" }
            })
            .then(res => res.json())
            .then(response => {
              if (response.status === "Success") {
                // スプレッドシートのVLOOKUP・COUNTIFの結果を反映
                outputData.innerHTML = "判定完了！<br><span style='font-size:1.4em; color:#155724;'>" + response.name + " さん</span><br>（累計面接回数: " + response.count + " 回）";
                outputData.className = "success-alert";
              } else {
                outputData.innerText = "エラー: " + response.message;
                outputData.className = "error-alert";
              }
              
              // 3秒後に次のスキャンを受け付ける
              setTimeout(() => {
                isProcessing = false;
                outputData.innerText = "QRコードをかざしてください";
                outputData.className = "";
                outputData.style.color = "#0056b3";
                requestAnimationFrame(tick);
              }, 3000);
            })
            .catch(err => {
              outputData.innerText = "通信エラー発生: " + err.message;
              outputData.className = "error-alert";
              isProcessing = false;
              requestAnimationFrame(tick);
            });
              
            return;
          }
        }
        if (!isProcessing) {
          requestAnimationFrame(tick);
        }
      }
    }
  </script>
</body>
</html>
