<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRコード面接練習回数管理システム</title>
  <script src="https://script.google.com/macros/s/AKfycbygGcjEbmmHe3KaoRXFL0GB_68YLnXK-jgcIHn4Ezy5Dhnb0By6cyjqEKo_60ExOdik/exec"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 20px; background-color: #f8f9fa; color: #333; }
    h2 { color: #004085; }
    #canvas { width: 100%; max-width: 400px; border: 3px solid #007bff; border-radius: 8px; background: #eee; margin-top: 10px; }
    #result { font-size: 1.3em; font-weight: bold; color: #0056b3; margin-top: 15px; padding: 10px; border-radius: 5px; min-height: 40px; }
    .select-box { margin-bottom: 15px; font-size: 1.1em; padding: 5px; }
    select { font-size: 1.1em; padding: 6px 12px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold; }
    .success-alert { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error-alert { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    
    /* ボタン用のスタイルを追加 */
    .scan-btn { 
      font-size: 1.2em; 
      padding: 10px 20px; 
      background-color: #007bff; 
      color: white; 
      border: none; 
      border-radius: 5px; 
      cursor: pointer; 
      font-weight: bold;
      margin-top: 10px;
    }
    .scan-btn:hover { background-color: #0056b3; }
    .scan-btn:disabled { background-color: #6c757d; cursor: not-allowed; }
  </style>
</head>
<body>

  <h2>面接練習記録用 QRスキャナー</h2>
  
  <div class="select-box">
    <label for="teacher"><strong>担当先生: </strong></label>
    <select id="teacher">
      <option value="未選択">読み込み中...</option>
    </select>
  </div>
  
  <button id="startBtn" class="scan-btn">QRコードを読み取る</button>
  
  <br>
  <canvas id="canvas" hidden></canvas>
  <div id="loading" hidden>カメラを起動中...</div>
  <div id="result">担当先生を選択し、「QRコードを読み取る」ボタンを押してください</div>

  <script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbygGcjEbmmHe3KaoRXFL0GB_68YLnXK-jgcIHn4Ezy5Dhnb0By6cyjqEKo_60ExOdik/exec";
    
    let localStream = null; // カメラのストリームを保持する変数
    let video = document.createElement("video");

    window.addEventListener('DOMContentLoaded', () => {
      loadTeachers(); // 最初に先生のリストをスプレッドシートから持ってくる
      
      // ボタンのクリックイベントを設定
      document.getElementById("startBtn").addEventListener("click", () => {
        const teacherName = document.getElementById("teacher").value;
        if (teacherName === "未選択") {
          alert("エラー: 先に先生を選択してください！");
          return;
        }
        startCamera();
      });
    });

    // 先生マスターから名前を引っ張ってくる関数
    function loadTeachers() {
      const teacherSelect = document.getElementById("teacher");
      
      fetch(GAS_WEB_APP_URL)
        .then(res => res.json())
        .then(data => {
          teacherSelect.innerHTML = '<option value="未選択">-- 先生を選択してください --</option>';
          if (data.teachers && data.teachers.length > 0) {
            data.teachers.forEach(teacher => {
              const opt = document.createElement("option");
              opt.value = teacher;
              opt.textContent = teacher;
              teacherSelect.appendChild(opt);
            });
          } else {
            teacherSelect.innerHTML = '<option value="未選択">先生マスターが空っぽです</option>';
          }
        })
        .catch(err => {
          teacherSelect.innerHTML = '<option value="未選択">先生リストの取得に失敗しました</option>';
          console.error(err);
        });
    }

    function startCamera() {
      const canvasElement = document.getElementById("canvas");
      const canvas = canvasElement.getContext("2d", { willReadFrequently: true });
      const loadingMessage = document.getElementById("loading");
      const outputData = document.getElementById("result");
      const startBtn = document.getElementById("startBtn");
      let isProcessing = false; 

      // 起動中表示
      loadingMessage.hidden = false;
      startBtn.disabled = true; // 連打防止でボタンを無効化
      outputData.innerText = "カメラを起動しています...";
      outputData.className = "";

      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
        localStream = stream; // ストリームを保存
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.play();
        requestAnimationFrame(tick);
      }).catch(function(err) {
        outputData.innerText = "カメラが起動できません: " + err.message;
        outputData.className = "error-alert";
        startBtn.disabled = false;
        loadingMessage.hidden = true;
      });

      function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          if (loadingMessage) loadingMessage.hidden = true;
          canvasElement.hidden = false;

          canvasElement.height = video.videoHeight;
          canvasElement.width = video.videoWidth;
          canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
          
          var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
          var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
          
          if (code && !isProcessing) {
            isProcessing = true; 
            const teacherName = document.getElementById("teacher").value;

            // ★ 確認画面の表示
            // 生徒ID（code.data）と選択された先生を表示して確認
            const confirmRecord = confirm(
              "QRコードを検出しました。\n\n" +
              "【担当先生】: " + teacherName + "\n" +
              "【対象生徒ID】: " + code.data + "\n\n" +
              "この内容で記録を送信しますか？"
            );

            if (!confirmRecord) {
              // キャンセルされた場合は、少し待ってからスキャンを再開
              outputData.innerText = "キャンセルされました。再度QRコードをかざしてください。";
              setTimeout(() => {
                isProcessing = false;
                requestAnimationFrame(tick);
              }, 1500);
              return;
            }

            // OKが押されたら送信処理へ
            outputData.innerText = "記録中...";
            outputData.className = "";
            outputData.style.color = "orange";

            // GASへデータ送信
            fetch(GAS_WEB_APP_URL, {
              method: "POST",
              body: JSON.stringify({ teacherName: teacherName, studentId: code.data }),
              headers: { "Content-Type": "text/plain" }
            })
            .then(res => res.json())
            .then(response => {
              if (response.status === "Success") {
                outputData.innerHTML = "記録完了！<br><span style='font-size:1.4em; color:#155724;'>" + response.name + " さん</span>";
                outputData.className = "success-alert";
              } else {
                outputData.innerText = "エラー: " + response.message;
                outputData.className = "error-alert";
              }
              
              // 完了したらカメラを止めて初期状態に戻す
              stopCamera();
            })
            .catch(err => {
              outputData.innerText = "通信エラー発生: " + err.message;
              outputData.className = "error-alert";
              stopCamera();
            });
              
            return;
          }
        }
        if (!isProcessing) {
          requestAnimationFrame(tick);
        }
      }

      // カメラを停止してボタンを再活性化する内部関数
      function stopCamera() {
        if (localStream) {
          localStream.getTracks().forEach(track => track.stop()); // カメラのレンズをオフにする
        }
        canvasElement.hidden = true;
        startBtn.disabled = false; // ボタンを再度押せるようにする
        setTimeout(() => {
          if(outputData.className !== "success-alert" && outputData.className !== "error-alert") {
            outputData.innerText = "担当先生を選択し、「QRコードを読み取る」ボタンを押してください";
            outputData.style.color = "#0056b3";
          }
        }, 4000);
      }
    }
  </script>
</body>
</html>
